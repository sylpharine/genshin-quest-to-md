renderer: "format_examples/renderer_novel.py:render"
options:
  dialog_sep: "\n"
  branch_prefix: "> "
  branch_label: "分支{index}"
  indent_unit: "  "
  dialog_cont_prefix: "    "
  story_id_fmt: "StoryID: {story_id}"
  task_id_fmt: "TaskID: {task_id}"
  dialog_id_fmt: "DialogID: {dialog_id}"
  skip_fields:
    - story_id
    - task_id
    - dialog_id
